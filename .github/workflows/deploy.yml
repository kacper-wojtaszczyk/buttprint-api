name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: rg.nl-ams.scw.cloud/climacterium

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v4
        with:
          registry: rg.nl-ams.scw.cloud
          username: nologin
          password: ${{ secrets.SCALEWAY_API_SECRET_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push buttprint-api
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/buttprint-api:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/buttprint-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            maxmind_credentials=${{ secrets.MAXMIND_CREDENTIALS }}

      - name: Configure kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          printenv KUBECONFIG_CONTENT > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kapsule
        id: deploy
        env:
          SHA: ${{ steps.vars.outputs.sha_short }}
        run: |
          kubectl set image deployment/buttprint-api \
            buttprint-api=${REGISTRY}/buttprint-api:${SHA}

      - name: Wait for rollout
        run: kubectl rollout status deployment/buttprint-api --timeout=120s

      - name: Smoke test
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.buttprint.eu/health)
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "ERROR: /health returned ${HTTP_STATUS}, expected 204"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome != 'skipped'
        run: kubectl rollout undo deployment/buttprint-api
