name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          classify_inline_comments: 'true'
          include_fix_links: 'true'
          prompt: |
            Review this pull request thoroughly. This is a Go HTTP service
            (Go 1.26, net/http standard library, no framework, no CGO).

            ## Environment
            You are already on the PR merge ref. Dependencies are pre-downloaded (go mod download).
            Do NOT run git checkout or switch branches — just start reviewing.

            ## What to check

            **Correctness**
            - Logic errors, broken edge cases, subtle regressions
            - Error handling: every function that returns an error must have its error checked;
              errors should be wrapped with `%w` and contextual messages
            - Context propagation: HTTP handlers must pass `r.Context()` down the call chain;
              outbound HTTP calls must use `http.NewRequestWithContext`
            - Domain error mapping: `ErrNoData` → 404, `ErrUpstream` → 502,
              `context.DeadlineExceeded` → 504 — verify the handler switch is correct
            - RFC 3339 timestamps: use `time.RFC3339` constant, never hand-rolled format strings
            - Nil safety on nullable `*Lineage` pointers throughout the response chain

            **Go idioms**
            - `internal/` packages must not be exported or circumvented
            - Unexported interface types for dependency injection (`buttprintProvider`,
              `ipResolver`, `Renderer`) — new dependencies should follow this pattern
            - Table-driven tests with `t.Helper()` for assertion helpers
            - Explicit constructors (`NewService`, `NewHandler`) — no `init()` functions
            - Receiver naming: short, consistent (s for Service, h for Handler, c for Client)

            **Concurrency & resources**
            - HTTP response bodies must be closed (`defer resp.Body.Close()`)
            - Graceful shutdown: signal handling, context cancellation, resource cleanup
            - Rate limiter access must be thread-safe
            - No goroutine leaks — ensure goroutines have exit conditions

            **Security**
            - X-Forwarded-For parsing in client_ip.go — spoofing risks
            - CORS origin configuration — no wildcards in production
            - Input validation: lat ∈ [-90, 90], lon ∈ [-180, 180], timestamp is valid RFC 3339
            - No secrets, internal URLs, or MaxMind license keys in source

            **API contract**
            - Response struct changes must be backward-compatible (additive only)
            - Lineage is nullable per-variable — don't flatten or assume present
            - All scores must be in [0, 1] range after normalization
            - HTTP status codes: 200 (success), 204 (health), 400 (bad input),
              404 (no data), 429 (rate limited), 502 (upstream), 504 (timeout)

            **Scoring & rendering**
            - Scoring weights must sum to 1.0 (temperature + humidity + pm2.5 + pm10)
            - Renderer receives only `domain.Score`, never raw environmental values
            - SVG output must be well-formed XML

            ## What NOT to check
            - Formatting (gofmt handles this)
            - Struct field alignment
            - Pre-existing tech debt unrelated to this PR's changes

            ## Verification
            You can run these commands to verify the changes don't break anything:
            - `go vet ./...` — static analysis
            - `go test ./...` — full test suite
            - `gofmt -l .` — formatting check (should produce no output)
            - `make check` — combined gofmt + vet + test

            ## Output format
            - Post specific issues as inline comments on the relevant diff lines.
              Tag severity: 🔴 bug/must-fix, 🟡 nit/suggestion, 🟣 pre-existing.
            - Post a single summary comment on the PR with: what the PR does well,
              overall assessment, and a count of findings by severity.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 12
            --allowedTools "Read,Grep,Glob,Bash(git:*),Bash(go test:*),Bash(go vet:*),Bash(go build:*),Bash(gofmt:*),Bash(make:*),Bash(gh pr:*),mcp__github_inline_comment__create_inline_comment"
