version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-major-minor:
        update-types: ["major", "minor"]
      go-patch:
        update-types: ["patch"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-major-minor:
        update-types: ["major", "minor"]
      docker-patch:
        update-types: ["patch"]
